<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connections - Anemias</title>
  <style>
    :root {
      --bg: #f7f6f2;
      --ink: #1f1f1f;
      --muted: #666;
      --tile: #efede6;
      --tile-border: #d8d4c8;
      --tile-selected: #58534a;
      --tile-selected-text: #fff;
      --btn: #111;
      --btn-text: #fff;
      --easy: #f9df6d;
      --medium-easy: #a0c35a;
      --medium: #b0c4ef;
      --hard: #ba81c5;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Franklin Gothic Medium", "Arial Narrow", Arial, sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }

    .app {
      width: min(720px, 100%);
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: .02em;
    }

    .subtitle {
      margin: 8px 0 10px;
      color: var(--muted);
      font-size: 1rem;
    }

    .legend {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .badge {
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .78rem;
      font-weight: 700;
    }

    .easy { background: var(--easy); }
    .medium-easy { background: var(--medium-easy); }
    .medium { background: var(--medium); }
    .hard { background: var(--hard); }

    .groups {
      display: grid;
      gap: 8px;
      margin-bottom: 10px;
    }

    .group-row {
      border-radius: 8px;
      padding: 12px 10px;
      text-align: center;
      animation: dropIn .35s ease both;
    }

    .group-row h3 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: .01em;
    }

    .group-row p {
      margin: 6px 0 0;
      font-size: .9rem;
    }

    .meta {
      margin-top: 4px;
      font-size: .72rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      opacity: .85;
      font-weight: 700;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 10px;
    }

    .tile {
      border: 1px solid var(--tile-border);
      background: var(--tile);
      border-radius: 8px;
      min-height: 72px;
      padding: 8px;
      font-size: .95rem;
      font-weight: 700;
      color: var(--ink);
      cursor: pointer;
      transition: transform .08s ease, background .12s ease;
    }

    .tile:hover { transform: translateY(-1px); }

    .tile.selected {
      background: var(--tile-selected);
      color: var(--tile-selected-text);
      border-color: var(--tile-selected);
    }

    .mistakes {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: .92rem;
    }

    .dots { display: flex; gap: 6px; }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #111;
      opacity: .15;
    }

    .dot.active { opacity: 1; }

    .controls {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }

    button {
      border: 1px solid #bdb8ac;
      background: #fff;
      color: #222;
      border-radius: 999px;
      padding: 8px 14px;
      font-weight: 700;
      cursor: pointer;
      font-size: .9rem;
    }

    button.primary {
      background: var(--btn);
      color: var(--btn-text);
      border-color: var(--btn);
    }

    .message {
      min-height: 22px;
      font-size: .94rem;
      color: var(--muted);
      margin-bottom: 8px;
    }

    @keyframes dropIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Connections</h1>
    <div class="subtitle">Anemias · encontre 4 grupos de 4 termos</div>

    <div class="legend">
      <span class="badge easy">Fácil</span>
      <span class="badge medium-easy">Médio-fácil</span>
      <span class="badge medium">Médio</span>
      <span class="badge hard">Difícil</span>
    </div>

    <section class="groups" id="foundGroups"></section>
    <section class="grid" id="grid"></section>

    <div class="mistakes">
      <span>Erros restantes</span>
      <div class="dots" id="mistakeDots"></div>
    </div>

    <div class="controls">
      <button id="shuffleBtn">Embaralhar</button>
      <button id="clearBtn">Desmarcar</button>
      <button id="submitBtn" class="primary">Enviar</button>
      <button id="newBtn">Novo jogo</button>
    </div>

    <div class="message" id="message"></div>
  </main>

  <script>
    const SOURCE_GROUPS = [
      {
        name: "Ferropriva",
        difficulty: "easy",
        difficultyLabel: "Fácil",
        items: ["Ferritina baixa", "TIBC elevado", "Microcitose", "Hipocromia"],
      },
      {
        name: "Megaloblástica B12",
        difficulty: "medium-easy",
        difficultyLabel: "Médio-fácil",
        items: ["VCM > 100 fL", "Hipersegmentação", "Metilmalônico alto", "Parestesias"],
      },
      {
        name: "Hemólise",
        difficulty: "medium",
        difficultyLabel: "Médio",
        items: ["LDH elevado", "BI elevada", "Haptoglobina baixa", "Reticulocitose"],
      },
      {
        name: "Aplásica",
        difficulty: "hard",
        difficultyLabel: "Difícil",
        items: ["Pancitopenia", "Reticulócitos baixos", "Medula hipocelular", "Sem esplenomegalia"],
      },
    ];

    const grid = document.getElementById('grid');
    const foundGroups = document.getElementById('foundGroups');
    const message = document.getElementById('message');
    const mistakeDots = document.getElementById('mistakeDots');

    const shuffleBtn = document.getElementById('shuffleBtn');
    const clearBtn = document.getElementById('clearBtn');
    const submitBtn = document.getElementById('submitBtn');
    const newBtn = document.getElementById('newBtn');

    let tiles = [];
    let selected = new Set();
    let solvedGroups = new Set();
    let mistakesLeft = 4;

    function shuffle(arr) {
      const clone = [...arr];
      for (let i = clone.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [clone[i], clone[j]] = [clone[j], clone[i]];
      }
      return clone;
    }

    function difficultyRank(level) {
      const rank = { easy: 1, 'medium-easy': 2, medium: 3, hard: 4 };
      return rank[level] || 99;
    }

    function setMessage(text) {
      message.textContent = text;
    }

    function renderMistakes() {
      mistakeDots.innerHTML = '';
      for (let i = 0; i < 4; i++) {
        const dot = document.createElement('span');
        dot.className = `dot ${i < mistakesLeft ? 'active' : ''}`;
        mistakeDots.appendChild(dot);
      }
    }

    function buildTiles() {
      return SOURCE_GROUPS.flatMap(group =>
        group.items.map(item => ({ item, group: group.name, locked: false }))
      );
    }

    function renderGrid() {
      grid.innerHTML = '';
      for (const tile of tiles) {
        if (tile.locked) continue;
        const button = document.createElement('button');
        button.className = `tile ${selected.has(tile.item) ? 'selected' : ''}`;
        button.textContent = tile.item;
        button.onclick = () => toggleSelect(tile.item);
        grid.appendChild(button);
      }
    }

    function appendSolvedGroup(group, delay = 0) {
      const row = document.createElement('article');
      row.className = `group-row ${group.difficulty}`;
      row.style.animationDelay = `${delay}ms`;
      row.innerHTML = `
        <h3>${group.name}</h3>
        <div class="meta">${group.difficultyLabel}</div>
        <p>${group.items.join(' · ')}</p>
      `;
      foundGroups.appendChild(row);
    }

    function lockGroup(group) {
      solvedGroups.add(group.name);
      tiles = tiles.map(t => group.items.includes(t.item) ? { ...t, locked: true } : t);
      appendSolvedGroup(group);
      selected.clear();
      renderGrid();
    }

    function checkOneAway(picks) {
      return SOURCE_GROUPS.some(group => {
        const hits = group.items.filter(i => picks.includes(i)).length;
        return hits === 3;
      });
    }

    function revealAllAnimated() {
      foundGroups.innerHTML = '';
      const ordered = [...SOURCE_GROUPS].sort((a, b) => difficultyRank(a.difficulty) - difficultyRank(b.difficulty));
      ordered.forEach((group, idx) => appendSolvedGroup(group, idx * 170));
      submitBtn.disabled = true;
      clearBtn.disabled = true;
    }

    function submitSelection() {
      if (selected.size !== 4) {
        setMessage('Selecione exatamente 4 termos.');
        return;
      }

      const picks = [...selected];
      const match = SOURCE_GROUPS.find(group => group.items.every(item => picks.includes(item)));

      if (match && !solvedGroups.has(match.name)) {
        lockGroup(match);
        if (solvedGroups.size === 4) {
          setMessage('Excelente! Todas as categorias encontradas.');
          setTimeout(revealAllAnimated, 220);
        } else {
          setMessage(`Correto: ${match.name}.`);
        }
        return;
      }

      mistakesLeft -= 1;
      renderMistakes();
      if (mistakesLeft <= 0) {
        setMessage('Fim da rodada. Revelando respostas...');
        selected.clear();
        renderGrid();
        revealAllAnimated();
        return;
      }

      if (checkOneAway(picks)) {
        setMessage('Quase! Você está a 1 termo de um grupo correto.');
      } else {
        setMessage('Grupo incorreto. Tente outra combinação.');
      }
    }

    function toggleSelect(item) {
      if (selected.has(item)) selected.delete(item);
      else {
        if (selected.size >= 4) return;
        selected.add(item);
      }
      renderGrid();
    }

    function startGame() {
      selected.clear();
      solvedGroups.clear();
      mistakesLeft = 4;
      submitBtn.disabled = false;
      clearBtn.disabled = false;
      foundGroups.innerHTML = '';
      setMessage('');
      tiles = shuffle(buildTiles());
      renderGrid();
      renderMistakes();
    }

    submitBtn.addEventListener('click', submitSelection);
    clearBtn.addEventListener('click', () => {
      selected.clear();
      renderGrid();
      setMessage('Seleção limpa.');
    });
    shuffleBtn.addEventListener('click', () => {
      const unlocked = tiles.filter(t => !t.locked);
      const locked = tiles.filter(t => t.locked);
      tiles = [...shuffle(unlocked), ...locked];
      renderGrid();
      setMessage('Tabuleiro embaralhado.');
    });
    newBtn.addEventListener('click', startGame);

    startGame();
  </script>
</body>
</html>
